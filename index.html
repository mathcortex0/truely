<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Truely - Say What's Real. Connect with friends and share your thoughts.">
  <title>Truely — Feed</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5'%3E%3Cpath d='M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'/%3E%3C/svg%3E">
</head>
<body>
  <div id="nav-placeholder"></div>
  
  <main class="page-wrap">
    <div class="container">
      <div id="compose-box" class="compose-box" style="display: none;">
        <div class="compose-inner">
          <div class="avatar avatar-md" id="compose-avatar"></div>
          <div class="compose-right">
            <textarea id="post-content" class="compose-textarea" placeholder="What's happening?" maxlength="600" rows="3"></textarea>
            <div class="compose-footer">
              <span class="char-count" id="char-count">0 / 280</span>
              <button class="btn btn-primary btn-sm" id="post-submit">Post</button>
            </div>
          </div>
        </div>
      </div>
      
      <div id="posts-container"></div>
    </div>
  </main>
  
  <div id="toast-container" class="toast-container"></div>
  
  <div id="verify-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">Get Verified</div>
      <div class="modal-body">
        <p style="margin-bottom: var(--spacing-md);">Upgrade to verified account:</p>
        <div style="background: var(--bg-secondary); padding: var(--spacing-md); border-radius: var(--radius-lg); margin-bottom: var(--spacing-md);">
          <p style="font-weight: 600; margin-bottom: var(--spacing-xs);">Benefits:</p>
          <ul style="margin-left: var(--spacing-lg); color: var(--text-secondary);">
            <li>✓ Blue verification badge</li>
            <li>✓ 600 character posts (instead of 280)</li>
            <li>✓ 400 character messages</li>
            <li>✓ Priority support</li>
          </ul>
        </div>
        <div style="background: rgba(79, 70, 229, 0.1); padding: var(--spacing-md); border-radius: var(--radius-lg); text-align: center;">
          <p style="font-weight: 600; color: var(--accent-indigo);">Contact Admin</p>
          <p class="text-muted" style="font-size: 0.875rem;">Email: alamin05052008@gmail.com</p>
          <p class="text-muted" style="font-size: 0.75rem;">Payment: 99 BDT/month</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeVerifyModal()">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/feed.js"></script>
</body>
</html>
