<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ExamMaster</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
</head>
<body>
    <div class="container" style="max-width: 400px; display: flex; justify-content: center; align-items: center; height: 100vh;">
        <div class="card" style="width: 100%; text-align: center;">
            <h2 style="margin-bottom: 0.5rem;">Welcome to ExamMaster</h2>
            <p style="color: var(--text-muted); margin-bottom: 2rem;">Sign in to access exams</p>
            
            <button onclick="loginWithGoogle()" class="btn btn-outline" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 1rem; border: 1px solid #ddd;">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google" width="24">
                Continue with Google
            </button>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
