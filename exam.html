<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Live Exam</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
</head>
<body>
    <nav>
        <div class="brand">ExamMaster</div>
        <div id="timer" class="timer"></div>
    </nav>

    <div class="container" style="max-width: 800px;">
        <h2 id="exam-title" style="margin-bottom: 1rem;"></h2>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:1rem; color:var(--text-muted);">
                <span id="q-count"></span>
                <span id="q-marks"></span>
            </div>
            <h3 id="q-text" style="margin-bottom: 2rem;"></h3>
            <div id="options-container"></div>
            
            <div style="margin-top: 2rem; display: flex; justify-content: space-between;">
                <button id="prev-btn" class="btn btn-outline" onclick="changeQuestion(-1)">Previous</button>
                <button id="next-btn" class="btn btn-primary" onclick="changeQuestion(1)">Next</button>
                <button id="submit-btn" class="btn btn-danger" onclick="submitExam()" style="display:none;">Submit Exam</button>
            </div>
        </div>
    </div>

    <script src="js/exam.js"></script>
    <script>initExam();</script>
</body>
</html>
