<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
</head>
<body>
    <nav>
        <a href="#" class="brand">ExamMaster</a>
        <div id="user-display"></div>
    </nav>
    
    <div class="container">
        
        <!-- ADMIN PANEL -->
        <div id="admin-panel" class="card admin-create-form" style="display: none;">
            <h3><i class="fa-solid fa-user-gear"></i> Admin Panel</h3>
            
            <!-- Create New Exam -->
            <div style="margin-bottom: 2rem;">
                <h4>Create New Exam</h4>
                <div class="form-row">
                    <input type="text" id="new-exam-title" placeholder="Exam Title" class="input-group" style="margin:0; padding:0.75rem;">
                    <input type="number" id="new-exam-duration" placeholder="Duration (Mins)" class="input-group" style="margin:0; padding:0.75rem;">
                    <input type="number" id="new-exam-marks" placeholder="Total Marks" class="input-group" style="margin:0; padding:0.75rem;">
                </div>
                <div class="form-row">
                    <input type="number" id="new-exam-price" placeholder="Price (0 for Free)" class="input-group" style="margin:0; padding:0.75rem;">
                    <input type="text" id="new-exam-desc" placeholder="Short Description" class="input-group" style="margin:0; padding:0.75rem;">
                    <button onclick="createExam()" class="btn btn-primary" style="width:100%">Create Exam</button>
                </div>
            </div>

            <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid #ddd;">

            <!-- Upload CSV -->
            <div>
                <h4>Upload Questions (CSV)</h4>
                <p style="font-size: 0.85rem; color: #666;">Columns: Question, A, B, C, D, Correct (0-3), Marks</p>
                <div style="margin-top: 1rem; display: flex; gap: 1rem; align-items: center;">
                    <select id="import-exam-select" style="padding: 0.75rem; border-radius: 8px; border: 1px solid #ddd;"></select>
                    <input type="file" id="csvFile" accept=".csv">
                    <button onclick="handleCSVUpload(event)" class="btn btn-outline">Upload</button>
                </div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 3fr 1fr; gap: 2rem;">
            <div>
                <h2>Available Exams</h2>
                <div id="exam-list" class="exam-grid"></div>
            </div>
            
            <aside>
                <div class="card">
                    <h3 style="margin-bottom: 1rem;"><i class="fa-solid fa-trophy"></i> Live Leaderboard</h3>
                    <ul id="leaderboard-list" style="list-style: none;"></ul>
                </div>
            </aside>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script src="js/dashboard.js"></script>
    <script>initDashboard();</script>
</body>
</html>
