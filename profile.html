<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Profile</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
</head>
<body>
    <nav>
        <a href="dashboard.html" class="brand">ExamMaster</a>
        <a href="dashboard.html" class="btn btn-outline" style="font-size: 0.8rem;">Back to Dashboard</a>
    </nav>

    <div class="container" style="max-width: 900px;">
        <div class="profile-header">
            <img id="p-avatar" src="" alt="Avatar" class="profile-avatar">
            <div class="profile-info">
                <h1 id="p-name">Loading...</h1>
                <p id="p-email" style="color: var(--text-muted);"></p>
            </div>
        </div>

        <div class="stats-grid" style="margin-bottom: 2rem;">
            <div class="stat-box">
                <span class="stat-number" id="stat-count">0</span>
                <span class="stat-label">Exams Taken</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="stat-avg">0%</span>
                <span class="stat-label">Average Score</span>
            </div>
            <div class="stat-box">
                <span class="stat-number" id="stat-high">0%</span>
                <span class="stat-label">Highest Score</span>
            </div>
        </div>

        <div class="card">
            <h3>Exam History</h3>
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Exam Title</th>
                        <th>Score</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/profile.js"></script>
    <script>loadPublicProfile();</script>
</body>
</html>
