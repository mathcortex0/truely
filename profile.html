<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Profile — Truely</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style id="shared-css"></style>
<style>

/* ── COVER ── */
.profile-cover{
  height: 180px;
  background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.profile-cover img{width:100%;height:100%;object-fit:cover;display:block;}
.cover-edit-btn{
  position:absolute;bottom:10px;right:10px;
  background:rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.2);
  color:#fff;
  border-radius:20px;
  padding:6px 12px;
  font-size:12px;font-weight:600;
  cursor:pointer;
  display:none;
  backdrop-filter:blur(8px);
}
.profile-cover:hover .cover-edit-btn{display:block;}

/* ── PROFILE HEADER ── */
.profile-header{
  padding:0 16px 16px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.avatar-row{
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  margin-top:-32px;
  margin-bottom:12px;
}
.profile-av-wrap{position:relative;display:inline-block;}
.profile-av-edit{
  position:absolute;bottom:0;right:0;
  width:26px;height:26px;
  border-radius:50%;
  background:var(--bg3);
  border:2px solid var(--bg);
  display:none;
  align-items:center;justify-content:center;
  cursor:pointer;
}
.profile-av-edit svg{width:13px;height:13px;color:var(--text2);}
.profile-av-wrap:hover .profile-av-edit{display:flex;}

.profile-actions{display:flex;gap:8px;align-items:center;margin-top:8px;}

.profile-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:2px;}
.profile-name{font-size:20px;font-weight:800;font-family:var(--font);}
.profile-handle{font-size:14px;color:var(--text3);margin-bottom:8px;}
.profile-bio-text{font-size:15px;line-height:1.6;color:var(--text);margin-bottom:10px;white-space:pre-wrap;}
.profile-links{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px;}
.profile-link-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--text3);}
.profile-link-item a{color:var(--blue);}
.profile-link-item svg{width:14px;height:14px;flex-shrink:0;}
.profile-stats{display:flex;gap:20px;}
.pstat{cursor:pointer;}
.pstat:hover .pstat-num{color:var(--blue);}
.pstat-num{font-weight:800;font-size:15px;font-family:var(--mono);}
.pstat-label{font-size:13px;color:var(--text3);}

/* follow btn */
.follow-btn{padding:8px 20px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:var(--font);transition:all .15s;}
.follow-btn.follow{background:var(--text);color:var(--bg);}
.follow-btn.follow:hover{opacity:.85;}
.follow-btn.following{background:transparent;border:1px solid var(--border2);color:var(--text);}
.follow-btn.following:hover{border-color:var(--red);color:var(--red);}
.msg-btn{padding:8px 16px;border-radius:20px;font-weight:600;font-size:14px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:all .15s;display:flex;align-items:center;gap:6px;}
.msg-btn:hover{border-color:var(--blue);color:var(--blue);}
.msg-btn svg{width:16px;height:16px;}
.edit-profile-btn{padding:8px 18px;border-radius:20px;font-weight:700;font-size:14px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text);font-family:var(--font);transition:all .15s;}
.edit-profile-btn:hover{background:var(--hover);}

/* ── PROFILE TABS ── */
.profile-tabs{
  display:flex;
  border-bottom:1px solid var(--border);
  position:sticky;
  top:53px;z-index:90;
  background:var(--bg);
}
.ptab{flex:1;padding:14px 0;text-align:center;font-size:14px;font-weight:600;color:var(--text3);cursor:pointer;border:none;background:none;position:relative;transition:color .15s;}
.ptab.active{color:var(--text);}
.ptab::after{content:'';position:absolute;bottom:-1px;left:25%;right:25%;height:2px;background:var(--text);border-radius:2px;transform:scaleX(0);transition:transform .2s;}
.ptab.active::after{transform:scaleX(1);}

/* ── POST CARD (same as feed) ── */
.post-card{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;animation:fadeUp .25s ease both;}
.post-card:hover{background:var(--hover);}
.post-main{flex:1;min-width:0;}
.post-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:2px;}
.post-meta{display:flex;align-items:center;gap:4px;flex-wrap:wrap;}
.post-name{font-weight:700;font-size:15px;}
.post-time{font-size:14px;color:var(--text3);}
.post-dot{color:var(--text3);font-size:12px;}
.post-content{font-size:15px;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word;margin-bottom:10px;}
.post-img{width:100%;border-radius:14px;overflow:hidden;margin-bottom:10px;}
.post-img img{width:100%;height:auto;display:block;max-height:400px;object-fit:cover;}
.post-more{width:30px;height:30px;border-radius:50%;border:none;background:transparent;color:var(--text3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.post-more:hover{background:rgba(29,155,240,.1);color:var(--blue);}
.post-more svg{width:17px;height:17px;}
.post-actions{display:flex;align-items:center;justify-content:space-between;max-width:300px;margin-top:4px;}
.act{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:20px;border:none;background:transparent;cursor:pointer;font-family:var(--mono);font-size:13px;color:var(--text3);transition:all .15s;}
.act svg{width:17px;height:17px;}
.act.like svg{fill:none;stroke:currentColor;stroke-width:2;}
.act.like.liked{color:var(--red);}
.act.like.liked svg{fill:var(--red);stroke:var(--red);}
.act.like:hover{color:var(--red);background:rgba(244,33,46,.08);}
.act.comment:hover{color:var(--blue);background:rgba(29,155,240,.08);}
.act.repost.reposted{color:var(--green);}
.act.repost:hover{color:var(--green);background:rgba(0,186,124,.08);}

/* ── EDIT PROFILE MODAL ── */
.edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;justify-content:center;align-items:center;padding:20px;}
.edit-modal.open{display:flex;animation:fadeIn .2s ease;}
.edit-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;animation:scaleIn .2s ease;}
.edit-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.edit-card-head h2{font-size:18px;font-weight:800;}
.edit-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;}
.char-hint{font-size:11px;color:var(--text3);text-align:right;margin-top:3px;}

/* ── FOLLOWERS MODAL ── */
.follows-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;justify-content:center;align-items:center;padding:20px;}
.follows-modal.open{display:flex;animation:fadeIn .2s ease;}
.follows-card{background:var(--card);border:1px solid var(--border2);border-radius:20px;width:100%;max-width:400px;max-height:80vh;display:flex;flex-direction:column;animation:scaleIn .2s ease;}
.follows-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.follows-head h3{font-size:16px;font-weight:700;}
.follows-list{overflow-y:auto;flex:1;}
.follow-user-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;}
.follow-user-item:hover{background:var(--hover);}
.follow-user-info{flex:1;min-width:0;}
.follow-user-name{font-weight:700;font-size:14px;display:flex;align-items:center;gap:4px;}
.follow-user-bio{font-size:13px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── PINNED POST ── */
.pinned-label{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);padding:8px 16px 0;font-weight:600;}
.pinned-label svg{width:13px;height:13px;}

</style>
</head>
<body>
<div id="nav-ph"></div>
<div id="bn-ph"></div>

<div class="page-wrap">
  <div class="main-wrap">

    <!-- COVER -->
    <div class="profile-cover" id="profile-cover">
      <button class="cover-edit-btn" id="cover-edit-btn" onclick="triggerCoverUpload()">Edit cover</button>
      <input type="file" id="cover-upload" accept="image/*" onchange="uploadCover(event)" style="display:none"/>
    </div>

    <!-- PROFILE HEADER -->
    <div class="profile-header" id="profile-header">
      <div style="text-align:center;padding:40px 0;color:var(--text3)">
        <div class="skeleton" style="width:80px;height:80px;border-radius:50%;margin:0 auto 12px"></div>
        <div class="skeleton" style="width:140px;height:16px;border-radius:6px;margin:0 auto 8px"></div>
        <div class="skeleton" style="width:100px;height:13px;border-radius:6px;margin:0 auto"></div>
      </div>
    </div>

    <!-- TABS -->
    <div class="profile-tabs" id="profile-tabs" style="display:none">
      <button class="ptab active" id="ptab-posts"   onclick="switchPTab('posts')">Posts</button>
      <button class="ptab"        id="ptab-replies" onclick="switchPTab('replies')">Replies</button>
      <button class="ptab"        id="ptab-likes"   onclick="switchPTab('likes')">Likes</button>
    </div>

    <!-- POSTS LIST -->
    <div id="profile-posts"></div>

  </div>
</div>

<!-- EDIT PROFILE MODAL -->
<div class="edit-modal" id="edit-modal">
  <div class="edit-card">
    <div class="edit-card-head">
      <h2>Edit Profile</h2>
      <button class="edit-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input class="form-input" id="edit-name" maxlength="50" oninput="document.getElementById('name-hint').textContent=this.value.length+'/50'"/>
      <div class="char-hint" id="name-hint">0/50</div>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input class="form-input" id="edit-username" maxlength="20" placeholder="@username" oninput="checkUsername()"/>
      <div style="font-size:12px;margin-top:4px" id="username-status"></div>
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea class="form-input" id="edit-bio" rows="3" maxlength="160" style="resize:none" oninput="document.getElementById('bio-hint').textContent=this.value.length+'/160'"></textarea>
      <div class="char-hint" id="bio-hint">0/160</div>
    </div>
    <div class="form-group">
      <label>Website</label>
      <input class="form-input" id="edit-website" placeholder="https://yoursite.com" maxlength="100"/>
    </div>
    <div class="form-group">
      <label>Location</label>
      <input class="form-input" id="edit-location" placeholder="Dhaka, Bangladesh" maxlength="50"/>
    </div>
    <button class="btn btn-primary btn-full" onclick="saveProfile()">Save changes</button>
  </div>
</div>

<!-- FOLLOWS MODAL -->
<div class="follows-modal" id="follows-modal" onclick="closeFollowsModal(event)">
  <div class="follows-card">
    <div class="follows-head">
      <h3 id="follows-title">Followers</h3>
      <button class="edit-close" onclick="closeFollowsModal()">✕</button>
    </div>
    <div class="follows-list" id="follows-list"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/supabase.js"></script>
<script>

document.getElementById('shared-css').textContent = SHARED_CSS;
document.getElementById('nav-ph').innerHTML = getNavHTML('');
document.getElementById('bn-ph').innerHTML  = getBottomNavHTML('profile');

const params    = new URLSearchParams(location.search);
const profileId = params.get('id');
let profileData = null;
let isOwn       = false;
let isFollowing = false;
let currentPTab = 'posts';
let usernameTimer = null;

// ── INIT ─────────────────────────────────────────────────
if(!profileId){ location.href='/'; }

initSharedAuth(async()=>{
  await loadProfile();
});
setTimeout(async()=>{
  if(!window.TruelyState.currentUser) await loadProfile();
}, 300);

// ── LOAD PROFILE ─────────────────────────────────────────
async function loadProfile(){
  const{data:profile} = await sb.from('profiles').select('*').eq('id',profileId).single();
  if(!profile){
    document.getElementById('profile-header').innerHTML = `<div class="empty-state"><p>User not found</p></div>`;
    return;
  }
  profileData = profile;
  const user = window.TruelyState.currentUser;
  isOwn = user?.id === profileId;

  if(isOwn && user){
    document.getElementById('cover-edit-btn').style.display = 'block';
  }

  // Check follow status
  if(user && !isOwn){
    const{data:f} = await sb.from('follows').select('id').eq('follower_id',user.id).eq('following_id',profileId).single();
    isFollowing = !!f;
  }

  const admin  = profile.is_admin || profile.email === ADMIN_EMAIL;
  const badge  = admin ? adminBadge() : profile.is_verified ? verifiedBadge() : '';
  const ring   = admin ? 'admin-ring' : profile.is_verified ? 'verified-ring' : '';
  const avHTML = profile.avatar_url ? `<img src="${profile.avatar_url}" alt=""/>` : `<span>${(profile.full_name||'U')[0].toUpperCase()}</span>`;

  document.title = `${profile.full_name||'User'} — Truely`;

  // Cover
  const coverEl = document.getElementById('profile-cover');
  if(profile.cover_url){
    const img = document.createElement('img');
    img.src = profile.cover_url;
    img.alt = 'Cover';
    coverEl.insertBefore(img, coverEl.firstChild);
  }

  // Action buttons
  let actions = '';
  if(isOwn){
    actions = `<button class="edit-profile-btn" onclick="openEditModal()">Edit profile</button>`;
  } else if(user){
    actions = `
      <button class="msg-btn" onclick="window.location.href='/messages.html?to=${profileId}'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Message
      </button>
      <button class="follow-btn ${isFollowing?'following':'follow'}" id="follow-btn" onclick="toggleFollow()">
        ${isFollowing?'Following':'Follow'}
      </button>`;
  }

  document.getElementById('profile-header').innerHTML = `
    <div class="avatar-row">
      <div class="profile-av-wrap">
        <div class="avatar av-xl ${ring}" id="profile-av">${avHTML}</div>
        ${isOwn?`<div class="profile-av-edit" onclick="triggerAvatarUpload()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </div><input type="file" id="av-upload" accept="image/*" onchange="uploadAvatar(event)" style="display:none"/>` : ''}
      </div>
      <div class="profile-actions">${actions}</div>
    </div>
    <div class="profile-name-row">
      <span class="profile-name">${esc(profile.full_name||'User')}</span>
      ${badge}
    </div>
    <div class="profile-handle">@${esc(profile.username||profile.full_name?.toLowerCase().replace(/\s+/g,'_')||'user')}</div>
    ${profile.bio ? `<div class="profile-bio-text">${esc(profile.bio)}</div>` : ''}
    <div class="profile-links">
      ${profile.website ? `<div class="profile-link-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg><a href="${esc(profile.website)}" target="_blank">${esc(profile.website.replace(/https?:\/\//,''))}</a></div>` : ''}
      ${profile.location ? `<div class="profile-link-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${esc(profile.location)}</div>` : ''}
      <div class="profile-link-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Joined ${new Date(profile.created_at).toLocaleDateString('en',{month:'long',year:'numeric'})}</div>
    </div>
    <div class="profile-stats">
      <div class="pstat" onclick="openFollows('following')">
        <span class="pstat-num">${fmtCount(profile.following_count)}</span>
        <span class="pstat-label"> Following</span>
      </div>
      <div class="pstat" onclick="openFollows('followers')">
        <span class="pstat-num">${fmtCount(profile.follower_count)}</span>
        <span class="pstat-label"> Followers</span>
      </div>
      <div class="pstat">
        <span class="pstat-num">${fmtCount(profile.post_count)}</span>
        <span class="pstat-label"> Posts</span>
      </div>
    </div>`;

  document.getElementById('profile-tabs').style.display = 'flex';
  loadProfilePosts();
}

// ── TABS ─────────────────────────────────────────────────
function switchPTab(tab){
  currentPTab = tab;
  ['posts','replies','likes'].forEach(t=>{
    document.getElementById(`ptab-${t}`).className = 'ptab' + (t===tab?' active':'');
  });
  loadProfilePosts();
}

// ── LOAD POSTS ───────────────────────────────────────────
async function loadProfilePosts(){
  const wrap = document.getElementById('profile-posts');
  wrap.innerHTML = renderSkeletons(4);

  let posts, error;
  const user = window.TruelyState.currentUser;

  if(currentPTab === 'posts'){
    ({data:posts,error} = await sb.from('posts')
      .select(`*, profiles!posts_author_id_fkey(id,full_name,email,avatar_url,is_verified,is_admin)`)
      .eq('author_id', profileId)
      .order('created_at',{ascending:false}));
  } else if(currentPTab === 'replies'){
    const{data:comments} = await sb.from('comments')
      .select(`*, posts(*, profiles!posts_author_id_fkey(id,full_name,email,avatar_url,is_verified,is_admin))`)
      .eq('user_id', profileId)
      .order('created_at',{ascending:false});
    posts = (comments||[]).map(c=>c.posts).filter(Boolean);
  } else if(currentPTab === 'likes'){
    const{data:likes} = await sb.from('likes')
      .select(`*, posts(*, profiles!posts_author_id_fkey(id,full_name,email,avatar_url,is_verified,is_admin))`)
      .eq('user_id', profileId)
      .order('created_at',{ascending:false});
    posts = (likes||[]).map(l=>l.posts).filter(Boolean);
  }

  if(!posts||posts.length===0){
    wrap.innerHTML = `<div class="empty-state"><p>No ${currentPTab} yet</p></div>`;
    return;
  }

  let likedSet = new Set();
  if(user){
    const ids = posts.map(p=>p.id);
    const{data:liked} = await sb.from('likes').select('post_id').eq('user_id',user.id).in('post_id',ids);
    (liked||[]).forEach(l=>likedSet.add(l.post_id));
  }

  wrap.innerHTML = posts.map((p,i)=>renderPostCard(p,likedSet.has(p.id),i)).join('');
}

function renderSkeletons(n){
  return Array(n).fill(0).map(()=>`
<div class="skel-post" style="display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)">
  <div class="skeleton" style="width:40px;height:40px;border-radius:50%;flex-shrink:0"></div>
  <div style="flex:1">
    <div class="skeleton" style="height:13px;width:35%;margin-bottom:8px;border-radius:6px"></div>
    <div class="skeleton" style="height:13px;width:90%;margin-bottom:6px;border-radius:6px"></div>
    <div class="skeleton" style="height:13px;width:60%;border-radius:6px"></div>
  </div>
</div>`).join('');
}

function renderPostCard(post, liked, idx=0){
  const p = post.profiles;
  if(!p) return '';
  const name  = esc(p.full_name||'User');
  const admin = p.is_admin||p.email===ADMIN_EMAIL;
  const badge = admin?adminBadge():p.is_verified?verifiedBadge():'';
  const ring  = admin?'admin-ring':p.is_verified?'verified-ring':'';
  const avHTML= p.avatar_url?`<img src="${p.avatar_url}" alt=""/>`:(`<span>${(p.full_name||'U')[0].toUpperCase()}</span>`);
  const canDel= window.TruelyState.currentUser?.id===post.author_id||isAdmin();
  const delay = Math.min(idx*0.04,0.4);

  return `<div class="post-card" id="post-${post.id}" style="animation-delay:${delay}s" onclick="window.location.href='/post.html?id=${post.id}'">
    <div class="avatar av-md ${ring}" onclick="event.stopPropagation();window.location.href='/profile.html?id=${p.id}'">${avHTML}</div>
    <div class="post-main">
      <div class="post-header">
        <div class="post-meta">
          <span class="post-name">${name}</span>${badge}
          <span class="post-dot">·</span>
          <span class="post-time">${timeAgo(post.created_at)}</span>
        </div>
        ${canDel?`<button class="post-more" onclick="event.stopPropagation();deletePost(${post.id})">
          <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
        </button>`:''}
      </div>
      ${post.content?`<div class="post-content">${esc(post.content)}</div>`:''}
      ${post.image_url?`<div class="post-img"><img src="${post.image_url}" alt="" loading="lazy"/></div>`:''}
      <div class="post-actions" onclick="event.stopPropagation()">
        <button class="act like ${liked?'liked':''}" id="lb-${post.id}" onclick="toggleLike(event,${post.id},${liked})">
          <svg viewBox="0 0 24 24" stroke-width="2"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          <span id="lc-${post.id}">${fmtCount(post.like_count)}</span>
        </button>
        <button class="act comment" onclick="window.location.href='/post.html?id=${post.id}'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>${fmtCount(post.comment_count)}</span>
        </button>
      </div>
    </div>
  </div>`;
}

// ── INTERACTIONS ─────────────────────────────────────────
async function toggleLike(e, postId, liked){
  e.stopPropagation();
  const user = window.TruelyState.currentUser;
  if(!user){ toast('Sign in to like'); return; }
  const btn=document.getElementById(`lb-${postId}`);
  const cnt=document.getElementById(`lc-${postId}`);
  let count=parseInt(cnt.textContent)||0;
  if(liked){
    await sb.from('likes').delete().eq('post_id',postId).eq('user_id',user.id);
    btn.className='act like';
    cnt.textContent=fmtCount(Math.max(0,count-1));
    btn.setAttribute('onclick',`toggleLike(event,${postId},false)`);
  } else {
    await sb.from('likes').insert({post_id:postId,user_id:user.id});
    btn.className='act like liked';
    cnt.textContent=fmtCount(count+1);
    btn.setAttribute('onclick',`toggleLike(event,${postId},true)`);
  }
}

async function deletePost(postId){
  if(!confirm('Delete?')) return;
  await sb.from('posts').delete().eq('id',postId);
  document.getElementById(`post-${postId}`)?.remove();
  toast('Deleted');
}

// ── FOLLOW ───────────────────────────────────────────────
async function toggleFollow(){
  const user = window.TruelyState.currentUser;
  if(!user){ return; }
  const btn = document.getElementById('follow-btn');
  if(isFollowing){
    await sb.from('follows').delete().eq('follower_id',user.id).eq('following_id',profileId);
    isFollowing = false;
    btn.textContent = 'Follow';
    btn.className = 'follow-btn follow';
    toast('Unfollowed');
  } else {
    await sb.from('follows').insert({follower_id:user.id,following_id:profileId});
    isFollowing = true;
    btn.textContent = 'Following';
    btn.className = 'follow-btn following';
    await sb.from('notifications').insert({user_id:profileId,from_user_id:user.id,type:'follow'});
    toast('Following');
  }
}

// ── FOLLOWS MODAL ────────────────────────────────────────
async function openFollows(type){
  document.getElementById('follows-modal').classList.add('open');
  document.getElementById('follows-title').textContent = type==='followers'?'Followers':'Following';
  const list = document.getElementById('follows-list');
  list.innerHTML = renderSkeletons(3);

  let userIds = [];
  if(type==='followers'){
    const{data}=await sb.from('follows').select('follower_id').eq('following_id',profileId);
    userIds=(data||[]).map(f=>f.follower_id);
  } else {
    const{data}=await sb.from('follows').select('following_id').eq('follower_id',profileId);
    userIds=(data||[]).map(f=>f.following_id);
  }

  if(userIds.length===0){list.innerHTML=`<div class="empty-state"><p>No ${type} yet</p></div>`;return;}

  const{data:profiles}=await sb.from('profiles').select('*').in('id',userIds);
  list.innerHTML=(profiles||[]).map(p=>{
    const admin=p.is_admin||p.email===ADMIN_EMAIL;
    const badge=admin?adminBadge():p.is_verified?verifiedBadge(14):'';
    const ring=admin?'admin-ring':p.is_verified?'verified-ring':'';
    const avHTML=p.avatar_url?`<img src="${p.avatar_url}" alt=""/>`:(`<span>${(p.full_name||'U')[0].toUpperCase()}</span>`);
    return `<div class="follow-user-item" onclick="window.location.href='/profile.html?id=${p.id}'">
      <div class="avatar av-md ${ring}">${avHTML}</div>
      <div class="follow-user-info">
        <div class="follow-user-name">${esc(p.full_name||'User')}${badge}</div>
        <div class="follow-user-bio">${esc(p.bio||'@'+(p.username||''))}</div>
      </div>
    </div>`;
  }).join('');
}
function closeFollowsModal(e){
  if(e&&e.target!==document.getElementById('follows-modal'))return;
  document.getElementById('follows-modal').classList.remove('open');
}

// ── EDIT PROFILE ─────────────────────────────────────────
function openEditModal(){
  const p = profileData;
  document.getElementById('edit-name').value     = p.full_name||'';
  document.getElementById('edit-username').value = p.username||'';
  document.getElementById('edit-bio').value      = p.bio||'';
  document.getElementById('edit-website').value  = p.website||'';
  document.getElementById('edit-location').value = p.location||'';
  document.getElementById('name-hint').textContent = (p.full_name||'').length+'/50';
  document.getElementById('bio-hint').textContent  = (p.bio||'').length+'/160';
  document.getElementById('edit-modal').classList.add('open');
}
function closeEditModal(){ document.getElementById('edit-modal').classList.remove('open'); }

let usernameAvailable = true;
async function checkUsername(){
  clearTimeout(usernameTimer);
  const val = document.getElementById('edit-username').value.trim().toLowerCase();
  const status = document.getElementById('username-status');
  if(!val){ status.textContent=''; return; }
  if(!/^[a-z0-9_]{3,20}$/.test(val)){
    status.style.color='var(--red)';
    status.textContent='3-20 chars, letters/numbers/underscore only';
    usernameAvailable=false; return;
  }
  usernameTimer = setTimeout(async()=>{
    if(val===profileData.username){status.textContent='';usernameAvailable=true;return;}
    const{data}=await sb.from('profiles').select('id').eq('username',val).single();
    if(data){ status.style.color='var(--red)'; status.textContent='Username taken'; usernameAvailable=false; }
    else{ status.style.color='var(--green)'; status.textContent='Available'; usernameAvailable=true; }
  }, 400);
}

async function saveProfile(){
  if(!usernameAvailable){ toast('Fix username first','error'); return; }
  const user = window.TruelyState.currentUser;
  if(!user) return;
  const updates = {
    full_name: document.getElementById('edit-name').value.trim()||profileData.full_name,
    username:  document.getElementById('edit-username').value.trim().toLowerCase()||profileData.username,
    bio:       document.getElementById('edit-bio').value.trim(),
    website:   document.getElementById('edit-website').value.trim(),
    location:  document.getElementById('edit-location').value.trim(),
  };
  const{error}=await sb.from('profiles').update(updates).eq('id',user.id);
  if(error){ toast('Save failed','error'); return; }
  Object.assign(profileData, updates);
  closeEditModal();
  toast('Profile updated');
  loadProfile();
}

// ── UPLOAD AVATAR ────────────────────────────────────────
function triggerAvatarUpload(){ document.getElementById('av-upload').click(); }
async function uploadAvatar(e){
  const file=e.target.files[0], user=window.TruelyState.currentUser;
  if(!file||!user) return;
  const ext=file.name.split('.').pop();
  const path=`${user.id}/avatar.${ext}`;
  const{error}=await sb.storage.from('avatars').upload(path,file,{upsert:true});
  if(error){ toast('Upload failed','error'); return; }
  const{data:{publicUrl}}=sb.storage.from('avatars').getPublicUrl(path);
  await sb.from('profiles').update({avatar_url:publicUrl}).eq('id',user.id);
  profileData.avatar_url = publicUrl;
  document.getElementById('profile-av').innerHTML=`<img src="${publicUrl}" alt=""/>`;
  window.TruelyState.userProfile.avatar_url = publicUrl;
  updateNavAvatar();
  toast('Photo updated');
}

// ── UPLOAD COVER ─────────────────────────────────────────
function triggerCoverUpload(){ document.getElementById('cover-upload').click(); }
async function uploadCover(e){
  const file=e.target.files[0], user=window.TruelyState.currentUser;
  if(!file||!user) return;
  const ext=file.name.split('.').pop();
  const path=`${user.id}/cover.${ext}`;
  const{error}=await sb.storage.from('covers').upload(path,file,{upsert:true});
  if(error){ toast('Upload failed','error'); return; }
  const{data:{publicUrl}}=sb.storage.from('covers').getPublicUrl(path);
  await sb.from('profiles').update({cover_url:publicUrl}).eq('id',user.id);
  profileData.cover_url = publicUrl;
  const cover = document.getElementById('profile-cover');
  let img = cover.querySelector('img');
  if(!img){ img=document.createElement('img'); img.alt='Cover'; cover.insertBefore(img,cover.firstChild); }
  img.src = publicUrl;
  toast('Cover updated');
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeEditModal();
    closeFollowsModal();
  }
});

</script>
