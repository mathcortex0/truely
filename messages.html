<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Truely — Messages</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style id="shared-css"></style>
<style>
.msg-layout{display:flex;height:calc(100vh - 56px);}
.sidebar{width:300px;border-right:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;flex-shrink:0;}
.sidebar-head{padding:16px;border-bottom:1px solid var(--border);}
.sidebar-head h2{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;}
.search-input{width:100%;padding:9px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;margin-top:10px;transition:border 0.2s;}
.search-input:focus{border-color:var(--indigo);}
.conv-list{flex:1;overflow-y:auto;}
.conv-item{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid var(--border);}
.conv-item:hover,.conv-item.active{background:var(--hover);}
.conv-info{flex:1;min-width:0;}
.conv-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:4px;}
.conv-preview{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.chat-area{flex:1;display:flex;flex-direction:column;background:var(--bg);}
.chat-head{padding:12px 16px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:10px;}
.chat-head-name{font-family:'Syne',sans-serif;font-weight:700;font-size:16px;display:flex;align-items:center;gap:4px;}
.chat-head-sub{font-size:12px;color:var(--red);font-weight:600;}
.messages-list{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;}
.bubble-wrap{display:flex;gap:8px;align-items:flex-end;animation:fadeIn 0.2s ease;}
.bubble-wrap.mine{flex-direction:row-reverse;}
.bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;position:relative;}
.bubble-wrap.mine .bubble{background:var(--indigo);color:#fff;border-bottom-right-radius:4px;}
.bubble-wrap.other .bubble{background:var(--card);color:var(--text);border-bottom-left-radius:4px;border:1px solid var(--border);}
.bubble img{max-width:200px;border-radius:10px;display:block;margin-top:6px;}
.bubble-time{font-size:10px;opacity:0.6;margin-top:4px;display:block;}
.timer-bar{height:2px;border-radius:2px;background:rgba(255,255,255,0.3);margin-top:6px;transition:width linear;}
.timer-bar.other-timer{background:rgba(79,70,229,0.3);}
.compose-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--card);}
.compose-row{display:flex;gap:8px;align-items:center;}
.msg-input{flex:1;padding:10px 16px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border 0.2s;}
.msg-input:focus{border-color:var(--indigo);}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--indigo);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;}
.send-btn:hover{background:var(--indigo-light);transform:scale(1.05);}
.send-btn svg{width:18px;height:18px;fill:white;}
.img-btn{width:36px;height:36px;border-radius:50%;background:transparent;border:1px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:all 0.2s;flex-shrink:0;}
.img-btn:hover{border-color:var(--cyan);color:var(--cyan);}
.compose-meta{font-size:12px;color:var(--muted);margin-bottom:8px;display:flex;justify-content:space-between;}
.compose-meta .limit{font-weight:600;}
.limit.warn{color:var(--gold);}
.limit.over{color:var(--red);}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px;}
.empty-chat .icon{font-size:48px;}
.no-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:8px;}
.no-chat .icon{font-size:56px;}
#img-upload{display:none;}
@media(max-width:600px){.sidebar{width:100%;}.chat-area{display:none;}.sidebar.hide{display:none;}.chat-area.show{display:flex;}}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-wrap" style="padding-top:56px">
  <div class="msg-layout">
    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-head">
        <h2>Messages</h2>
        <input class="search-input" id="user-search" placeholder="Search people..." oninput="searchUsers()"/>
      </div>
      <div class="conv-list" id="conv-list">
        <div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Sign in to message</div>
      </div>
    </div>
    <!-- CHAT AREA -->
    <div class="chat-area" id="chat-area">
      <div class="no-chat">
        <div class="icon">💬</div>
        <p style="font-weight:600">Select a conversation</p>
        <p style="font-size:13px">Messages disappear after 30 seconds</p>
      </div>
    </div>
  </div>
</div>
<input type="file" id="img-upload" accept="image/*" onchange="sendImage(event)"/>
<div class="toast" id="toast"></div>
<script src="/supabase.js"></script>
<script>
document.getElementById('shared-css').textContent = SHARED_CSS;
document.getElementById('nav-placeholder').innerHTML = getNavHTML('messages');

let activeConvUserId = null;
let msgInterval = null;
let searchResults = [];

// Open conversation from URL param
const params = new URLSearchParams(window.location.search);
const toUserId = params.get('to');

async function loadConversations() {
  const user = window.TruelyState.currentUser;
  if (!user) return;
  // Get all users this person has messaged or been messaged by
  const { data: msgs } = await sb.from('messages')
    .select('sender_id, receiver_id')
    .or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`);
  if (!msgs) return;
  const userIds = [...new Set(msgs.flatMap(m => [m.sender_id, m.receiver_id]).filter(id => id !== user.id))];
  if (userIds.length === 0) {
    document.getElementById('conv-list').innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No conversations yet</div>';
    return;
  }
  const { data: profiles } = await sb.from('profiles').select('*').in('id', userIds);
  renderConvList(profiles || []);
}

function renderConvList(profiles) {
  const list = document.getElementById('conv-list');
  list.innerHTML = profiles.map(p => {
    const isAdmin = p.is_admin || p.email === ADMIN_EMAIL;
    const isVerified = p.is_verified;
    const badge = isAdmin ? adminBadge() : isVerified ? verifiedBadge(14) : '';
    const av = p.avatar_url;
    const name = p.full_name || 'User';
    return `<div class="conv-item${activeConvUserId===p.id?' active':''}" onclick="openConv('${p.id}','${escHtml(name)}')">
      <div class="avatar av-sm${isAdmin?' admin-ring':isVerified?' verified-ring':''}">${av?`<img src="${av}"/>`:name.charAt(0).toUpperCase()}</div>
      <div class="conv-info">
        <div class="conv-name">${escHtml(name)}${badge}</div>
        <div class="conv-preview">Tap to chat</div>
      </div>
    </div>`;
  }).join('');
}

async function searchUsers() {
  const q = document.getElementById('user-search').value.trim();
  const user = window.TruelyState.currentUser;
  if (!user) return;
  if (!q) { loadConversations(); return; }
  const { data: profiles } = await sb.from('profiles').select('*').ilike('full_name', `%${q}%`).neq('id', user.id).limit(10);
  renderConvList(profiles || []);
}

async function openConv(userId, userName) {
  activeConvUserId = userId;
  clearInterval(msgInterval);
  // Update active state
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[onclick*="${userId}"]`)?.classList.add('active');

  const { data: profile } = await sb.from('profiles').select('*').eq('id', userId).single();
  const isAdmin = profile?.is_admin || profile?.email === ADMIN_EMAIL;
  const isVerified = profile?.is_verified;
  const badge = isAdmin ? adminBadge() : isVerified ? verifiedBadge() : '';
  const av = profile?.avatar_url;
  const user = window.TruelyState.currentUser;
  const myProfile = window.TruelyState.userProfile;
  const myIsAdmin = myProfile?.is_admin || user?.email === ADMIN_EMAIL;
  const limit = getMsgLimit();
  const limitLabel = limit === Infinity ? 'Unlimited' : `${limit} chars`;

  document.getElementById('chat-area').innerHTML = `
    <div class="chat-head">
      <div class="avatar av-sm${isAdmin?' admin-ring':isVerified?' verified-ring':''}" style="cursor:pointer" onclick="window.location.href='/profile.html?id=${userId}'">${av?`<img src="${av}"/>`:userName.charAt(0).toUpperCase()}</div>
      <div>
        <div class="chat-head-name">${escHtml(userName)}${badge}</div>
        <div class="chat-head-sub">⏱ Messages delete in 30s</div>
      </div>
    </div>
    <div class="messages-list" id="messages-list"></div>
    <div class="compose-area">
      <div class="compose-meta">
        <span>⏱ Each message auto-deletes after 30 seconds</span>
        <span class="limit" id="msg-limit-el">0 / ${limitLabel}</span>
      </div>
      <div class="compose-row">
        ${myIsAdmin?`<button class="img-btn" onclick="document.getElementById('img-upload').click()" title="Send image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>`:''}
        <input class="msg-input" id="msg-input" placeholder="Type a message..." maxlength="${limit===Infinity?9999:limit}" oninput="updateMsgCount()"/>
        <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg></button>
      </div>
    </div>`;

  loadMessages();
  // Poll for new messages every 3 seconds & delete expired
  msgInterval = setInterval(() => { loadMessages(); deleteExpiredMsgs(); }, 3000);
}

function updateMsgCount() {
  const input = document.getElementById('msg-input');
  const el = document.getElementById('msg-limit-el');
  if (!input || !el) return;
  const limit = getMsgLimit();
  const len = input.value.length;
  if (limit === Infinity) { el.textContent = `${len} / ∞`; el.className='limit'; return; }
  el.textContent = `${len} / ${limit}`;
  el.className = 'limit' + (len > limit*0.9 ? (len >= limit ? ' over' : ' warn') : '');
}

async function loadMessages() {
  const user = window.TruelyState.currentUser;
  if (!user || !activeConvUserId) return;
  // Delete expired first
  await deleteExpiredMsgs();
  const { data: msgs } = await sb.from('messages')
    .select('*')
    .or(`and(sender_id.eq.${user.id},receiver_id.eq.${activeConvUserId}),and(sender_id.eq.${activeConvUserId},receiver_id.eq.${user.id})`)
    .order('created_at', { ascending: true });
  const list = document.getElementById('messages-list');
  if (!list) return;
  if (!msgs || msgs.length === 0) {
    list.innerHTML = '<div class="empty-chat"><div class="icon">🔒</div><p style="font-weight:600">Encrypted conversation</p><p style="font-size:13px">Messages vanish after 30 seconds</p></div>';
    return;
  }
  const scrollBottom = list.scrollHeight - list.scrollTop === list.clientHeight;
  list.innerHTML = msgs.map(m => {
    const isMine = m.sender_id === user.id;
    const now = new Date();
    const exp = new Date(m.expires_at);
    const remaining = Math.max(0, Math.ceil((exp - now) / 1000));
    const pct = (remaining / MSG_TTL_SECONDS) * 100;
    return `<div class="bubble-wrap ${isMine?'mine':'other'}" id="msg-${m.id}">
      <div class="bubble">
        ${m.content ? escHtml(m.content) : ''}
        ${m.image_url ? `<img src="${m.image_url}" alt="image"/>` : ''}
        <span class="bubble-time">${timeAgo(m.created_at)} · ⏱${remaining}s</span>
        <div class="timer-bar${isMine?'':' other-timer'}" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');
  if (scrollBottom || msgs.length <= 3) list.scrollTop = list.scrollHeight;
}

async function deleteExpiredMsgs() {
  await sb.from('messages').delete().lt('expires_at', new Date().toISOString());
}

async function sendMessage() {
  const user = window.TruelyState.currentUser;
  if (!user || !activeConvUserId) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  const limit = getMsgLimit();
  if (!text) return;
  if (limit !== Infinity && text.length > limit) { showToast(`Max ${limit} characters`,'error'); return; }
  const expiresAt = new Date(Date.now() + MSG_TTL_SECONDS * 1000).toISOString();
  await sb.from('messages').insert({ sender_id: user.id, receiver_id: activeConvUserId, content: text, expires_at: expiresAt });
  input.value = '';
  updateMsgCount();
  loadMessages();
}

async function sendImage(e) {
  const file = e.target.files[0];
  const user = window.TruelyState.currentUser;
  const myProfile = window.TruelyState.userProfile;
  if (!file || !user || !activeConvUserId) return;
  if (!myProfile?.is_admin && user.email !== ADMIN_EMAIL) { showToast('Only admin can send images','error'); return; }
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const expiresAt = new Date(Date.now() + MSG_TTL_SECONDS * 1000).toISOString();
    await sb.from('messages').insert({ sender_id: user.id, receiver_id: activeConvUserId, image_url: ev.target.result, expires_at: expiresAt });
    loadMessages();
    showToast('Image sent (deletes in 30s)');
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// Allow Enter to send
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('msg-input') === document.activeElement) {
    e.preventDefault();
    sendMessage();
  }
});

initSharedAuth(async (user) => {
  await loadConversations();
  if (toUserId) {
    const { data: p } = await sb.from('profiles').select('*').eq('id', toUserId).single();
    if (p) openConv(toUserId, p.full_name || 'User');
  }
});
</script>
</body>
</html>
