<!-- MESSAGES.HTML -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Truely — Messages</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style id="_css"></style></head>
<body>
<div id="_nav" data-page="msgs"></div>
<div class="page-root" style="padding-top:52px">
<div class="msg-layout">
<div class="msg-side" id="msg-side">
  <div class="msg-head"><h2>Messages</h2><input class="search-pill" id="user-search" placeholder="Search people..." oninput="searchPeople()"/></div>
  <div class="conv-list" id="conv-list"><div style="padding:20px;text-align:center;color:var(--sub);font-size:13px">Sign in to message</div></div>
</div>
<div class="chat-area" id="chat-area">
  <div class="no-conv"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" color="var(--sub)"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p style="font-weight:600;color:var(--sub)">Select a conversation</p><p style="font-size:13px;color:var(--sub)">Messages vanish after 30 seconds</p></div>
</div>
</div>
</div>
<input type="file" id="img-msg-file" accept="image/*" style="display:none" onchange="sendImg(event)"/>
<div class="toast" id="_toast"></div>
<script src="/truely.js"></script>
<script>
document.getElementById('_css').textContent=CSS;
let activeUserId=null,msgInterval=null;
const toParam=new URLSearchParams(location.search).get('to');

async function loadConvs(){
  const user=T.state.user;if(!user)return;
  const{data:msgs}=await sb.from('messages').select('sender_id,receiver_id').or(`sender_id.eq.${user.id},receiver_id.eq.${user.id}`);
  if(!msgs||!msgs.length){document.getElementById('conv-list').innerHTML='<div style="padding:20px;text-align:center;color:var(--sub);font-size:13px">No conversations yet.<br/>Search for someone above.</div>';return;}
  const ids=[...new Set(msgs.flatMap(m=>[m.sender_id,m.receiver_id]).filter(id=>id!==user.id))];
  const{data:profs}=await sb.from('profiles').select('*').in('id',ids);
  renderConvs(profs||[]);
}

function renderConvs(profs){
  document.getElementById('conv-list').innerHTML=profs.map(p=>{
    const name=p.full_name||'User',av=p.avatar_url;
    const ring=Prof.ring(p),badge=Prof.badge(p);
    return `<div class="conv${activeUserId===p.id?' on':''}" onclick="openConv('${p.id}','${esc(name)}')">
      <div class="av av-sm${ring}">${av?`<img src="${av}"/>`:name.charAt(0)}</div>
      <div class="conv-info"><div class="conv-name">${esc(name)}${badge}</div><div class="conv-prev">Tap to chat</div></div>
    </div>`;
  }).join('');
}

async function searchPeople(){
  const q=document.getElementById('user-search').value.trim();
  const user=T.state.user;if(!user)return;
  if(!q){loadConvs();return;}
  const{data:profs}=await sb.from('profiles').select('*').ilike('full_name',`%${q}%`).neq('id',user.id).limit(10);
  renderConvs(profs||[]);
}

async function openConv(userId,userName){
  activeUserId=userId;clearInterval(msgInterval);
  document.querySelectorAll('.conv').forEach(el=>el.classList.remove('on'));
  document.querySelector(`[onclick*="'${userId}'"]`)?.classList.add('on');
  const{data:prof}=await sb.from('profiles').select('*').eq('id',userId).single();
  const isAdmin=Prof.isAdmin(prof),isVer=prof?.is_verified;
  const ring=Prof.ring(prof),badge=Prof.badge(prof),av=prof?.avatar_url;
  const user=T.state.user,myProf=T.state.profile;
  const myIsAdmin=Prof.isAdmin(myProf);
  const limit=Prof.msgLimit(myProf);
  const limitLabel=limit===Infinity?'∞':`${limit}`;
  const{data:{session}}=await sb.auth.getSession();
  document.getElementById('chat-area').innerHTML=`
    <div class="chat-head">
      <div class="av av-sm${ring}" onclick="location.href='/profile.html?id=${userId}'" style="cursor:pointer">${av?`<img src="${av}"/>`:userName.charAt(0)}</div>
      <div><div class="chat-head-name">${esc(userName)}${badge}</div><div class="chat-ttl">⏱ Messages delete in 30s</div></div>
    </div>
    <div class="msgs-list" id="msgs-list"></div>
    <div class="chat-foot">
      <div style="flex:1">
        <div class="msg-limit"><span>⏱ Auto-deletes after 30 seconds</span><span class="mc" id="mc">0/${limitLabel}</span></div>
        <div style="display:flex;gap:8px;align-items:center">
          ${myIsAdmin?`<button class="img-attach" onclick="document.getElementById('img-msg-file').click()" title="Send image"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>`:''}
          <input class="msg-in" id="msg-in" placeholder="Type a message..." oninput="updateMC()" onkeydown="if(event.key==='Enter')sendMsg()"/>
          <button class="send-btn" onclick="sendMsg()"><svg viewBox="0 0 24 24" width="17" height="17"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg></button>
        </div>
      </div>
    </div>`;
  loadMsgs();
  msgInterval=setInterval(()=>{loadMsgs();deleteExpired();},3000);
  // Mobile: show chat, hide sidebar
  if(window.innerWidth<=768){
    document.getElementById('msg-side').classList.add('hide');
    document.getElementById('chat-area').classList.add('show');
  }
}

function updateMC(){
  const input=document.getElementById('msg-in'),el=document.getElementById('mc');
  if(!input||!el)return;
  const limit=Prof.msgLimit(T.state.profile),len=input.value.length;
  if(limit===Infinity){el.textContent=`${len}/∞`;el.className='mc';return;}
  el.textContent=`${len}/${limit}`;
  el.className='mc'+(len>=limit?' over':len>limit*.85?' warn':'');
}

async function loadMsgs(){
  const user=T.state.user;if(!user||!activeUserId)return;
  await deleteExpired();
  const{data:msgs}=await sb.from('messages').select('*').or(`and(sender_id.eq.${user.id},receiver_id.eq.${activeUserId}),and(sender_id.eq.${activeUserId},receiver_id.eq.${user.id})`).order('created_at',{ascending:true});
  const list=document.getElementById('msgs-list');if(!list)return;
  const atBottom=list.scrollHeight-list.scrollTop<=list.clientHeight+50;
  if(!msgs||!msgs.length){list.innerHTML='<div style="text-align:center;padding:32px;color:var(--sub);font-size:13px">No messages yet.<br/>Messages delete after 30 seconds.</div>';return;}
  const now=new Date();
  list.innerHTML=msgs.map(m=>{
    const isMine=m.sender_id===user.id;
    const exp=new Date(m.expires_at),remaining=Math.max(0,Math.ceil((exp-now)/1000));
    const pct=(remaining/T.MSG_TTL)*100;
    return `<div class="bbl-wrap ${isMine?'mine':'other'}">
      <div class="av av-xs" style="margin-bottom:4px">${isMine?(T.state.profile?.avatar_url?`<img src="${T.state.profile.avatar_url}"/>`:((T.state.profile?.full_name||'U').charAt(0))):'?'}</div>
      <div class="bbl">
        ${m.content?esc(m.content):''}
        ${m.image_url?`<img src="${m.image_url}" alt=""/>`:''}
        <div class="bbl-meta">⏱ ${remaining}s</div>
        <div class="bbl-bar" style="width:${pct}%"></div>
      </div>
    </div>`;
  }).join('');
  if(atBottom)list.scrollTop=list.scrollHeight;
}

async function deleteExpired(){
  await sb.from('messages').delete().lt('expires_at',new Date().toISOString());
}

async function sendMsg(){
  const user=T.state.user;if(!user||!activeUserId)return;
  const input=document.getElementById('msg-in'),text=input.value.trim();
  const limit=Prof.msgLimit(T.state.profile);
  if(!text)return;
  if(limit!==Infinity&&text.length>limit){toast(`Max ${limit} characters`,'err');return;}
  const expiresAt=new Date(Date.now()+T.MSG_TTL*1000).toISOString();
  await sb.from('messages').insert({sender_id:user.id,receiver_id:activeUserId,content:text,expires_at:expiresAt});
  input.value='';updateMC();loadMsgs();
}

async function sendImg(e){
  const file=e.target.files[0];const user=T.state.user;
  if(!file||!user||!activeUserId)return;
  if(!Prof.isAdmin(T.state.profile)){toast('Only admin can send images','err');return;}
  const r=new FileReader();
  r.onload=async ev=>{
    const expiresAt=new Date(Date.now()+T.MSG_TTL*1000).toISOString();
    await sb.from('messages').insert({sender_id:user.id,receiver_id:activeUserId,image_url:ev.target.result,expires_at:expiresAt});
    loadMsgs();
  };
  r.readAsDataURL(file);e.target.value='';
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'&&window.innerWidth<=768){document.getElementById('msg-side').classList.remove('hide');document.getElementById('chat-area').classList.remove('show');}});

Auth.init(async(user)=>{
  if(!user){location.href='/landing.html';return;}
  await loadConvs();
  if(toParam){const{data:p}=await sb.from('profiles').select('*').eq('id',toParam).single();if(p)openConv(toParam,p.full_name||'User');}
});
</script>
</body>
</html>
