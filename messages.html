<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Truely - Private Messages">
  <title>Truely — Messages</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>
  
  <main class="page-wrap" style="padding-top: 0;">
    <div class="chat-layout">
      <div class="chat-sidebar" id="chat-sidebar">
        <div class="chat-sidebar-header">
          <h2>Messages</h2>
          <input type="text" id="search-users" class="chat-search" placeholder="Search people...">
        </div>
        <div id="conversations-list" class="conversation-list"></div>
      </div>
      
      <div class="chat-area" id="chat-area">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <h3>Select a conversation</h3>
          <p>Messages disappear after 30 seconds</p>
        </div>
      </div>
    </div>
  </main>
  
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/messages.js"></script>
</body>
</html>
