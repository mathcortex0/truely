<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Results</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container" style="text-align: center; padding-top: 4rem;">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <h1 style="font-size: 4rem; color: var(--primary); margin-bottom: 0.5rem;" id="score-display">--%</h1>
            <h2 id="result-msg" style="margin-bottom: 2rem; color: var(--text-muted);"></h2>
            
            <div style="display: flex; gap: 1rem; justify-content: center;">
                <a href="dashboard.html" class="btn btn-outline">Dashboard</a>
                <a href="profile.html" class="btn btn-primary">My Profile</a>
            </div>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const score = params.get('score');
        
        if(score) {
            document.getElementById('score-display').innerText = score + '%';
            const s = parseInt(score);
            let msg = 'Keep Practicing!';
            if(s >= 80) msg = 'Excellent Work!';
            else if(s >= 50) msg = 'Good Job!';
            document.getElementById('result-msg').innerText = msg;
        }
    </script>
</body>
</html>
