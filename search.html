<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Truely - Search">
  <title>Truely — Search</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div id="nav-placeholder"></div>
  
  <main class="page-wrap">
    <div class="container">
      <div class="search-header">
        <div class="search-wrapper">
          <span class="search-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18">
              <circle cx="11" cy="11" r="8"/>
              <line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
          </span>
          <input type="text" id="search-input" class="search-input" placeholder="Search people or posts..." autofocus>
        </div>
      </div>
      
      <div class="search-tabs">
        <button class="search-tab active" data-tab="people">People</button>
        <button class="search-tab" data-tab="posts">Posts</button>
      </div>
      
      <div id="search-results"></div>
    </div>
  </main>
  
  <div id="toast-container" class="toast-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/config.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/state.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/components.js"></script>
  <script src="/js/search.js"></script>
</body>
</html>
